models:
  - name: mrt_total_sales
    semantic_model:
      enabled: true
      name: total_sales_semantic
    agg_time_dimension: order_date

    columns:
      # 元々の order_date は純粋な「時間軸」として登録
      - name: order_date
        granularity: day
        dimension:
          type: time

    # ↓ここが最新仕様の「影分身」の作り方です！
    derived_semantics:
      entities:
        - name: date_id        # 主キー専用のダミー列
          type: primary
          expr: order_date     # order_dateの中身をコピー

    # 中間指標（measures）を挟まず、直接metricsを書けるのが新しい仕様の強みです
    metrics:
      - name: revenue
        description: "総売上"
        type: simple
        label: "売上"
        expr: total_revenue
        agg: sum

      - name: orders
        description: "総注文数"
        type: simple
        label: "注文数"
        expr: order_count
        agg: sum