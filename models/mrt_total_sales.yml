models:
  - name: mrt_total_sales
    semantic_model:
      enabled: true
      name: total_sales_semantic
      
    agg_time_dimension: order_date

    columns:
      - name: order_date
        granularity: day
        dimension:
          type: time

    metrics:
      - name: revenue
        description: "総売上"
        type: simple
        label: "売上"
        expr: total_revenue
        agg: sum

      - name: orders
        description: "総注文数"
        type: simple
        label: "注文数"
        expr: order_count
        agg: sum